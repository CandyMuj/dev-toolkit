<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: white;
        }
        .container {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        textarea {
            font-family: monospace;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        #connectBtn {
            background-color: #4CAF50;
            color: white;
        }
        #connectBtn:hover {
            background-color: #45a049;
        }
        #disconnectBtn {
            background-color: #f44336;
            color: white;
        }
        #disconnectBtn:hover {
            background-color: #da190b;
        }
        #clearBtn {
            background-color: #ff9800;
            color: white;
        }
        #clearBtn:hover {
            background-color: #e68900;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .status.connected {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.disconnected {
            background: #ffebee;
            color: #c62828;
        }
        #messages {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
        .message {
            margin-bottom: 8px;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            padding-left: 10px;
            background-color: #e8f5e9;
        }
        .error {
            border-left-color: #f44336;
            background-color: #ffebee;
        }
        .timestamp {
            color: #666;
            font-size: 11px;
            margin-right: 10px;
        }
        .header-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .header-row input {
            flex: 1;
        }
        .header-row button {
            padding: 10px 15px;
            font-size: 14px;
        }
        .add-btn {
            background-color: #2196F3;
            color: white;
        }
        .add-btn:hover {
            background-color: #0b7dda;
        }
        .remove-btn {
            background-color: #f44336 !important;
            color: white;
        }
        .remove-btn:hover {
            background-color: #da190b !important;
        }
        .history-list {
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
        }
        .history-item {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: #e3f2fd;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-url {
            flex: 1;
            font-size: 13px;
            color: #333;
        }
        .btn-delete {
            background: #f44336;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            margin-left: 10px;
        }
        .btn-delete:hover {
            background: #da190b;
        }
        .config-list {
            margin-top: 5px;
            padding-left: 20px;
            display: none;
        }
        .config-item {
            padding: 6px 8px;
            margin: 5px 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
        }
        .config-item:hover {
            background: #f0f0f0;
        }
        .config-info {
            flex: 1;
            color: #666;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .config-method {
            font-weight: bold;
            color: #2196F3;
        }
        .config-preview {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }
        .config-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SSE (Server-Sent Events) 测试页面</h1>
        
        <div class="input-group">
            <label for="urlInput">SSE 接口地址:</label>
            <input type="text" id="urlInput" placeholder="输入 SSE 接口地址，例如：http://localhost:8080/api/sse">
            <div id="historyList" class="history-list" style="display: none;"></div>
        </div>

        <div class="input-group">
            <label for="methodSelect">请求方式:</label>
            <select id="methodSelect">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
            </select>
        </div>

        <div class="input-group">
            <label for="bodyInput">请求体 (Body):</label>
            <textarea id="bodyInput" rows="4" placeholder='输入请求体，如: {"key": "value"}'></textarea>
        </div>

        <div class="input-group">
            <label>自定义 Headers:</label>
            <div id="headersContainer"></div>
        </div>
        
        <div class="button-group">
            <button id="connectBtn" onclick="connectSSE()">连接 SSE</button>
            <button id="disconnectBtn" onclick="disconnectSSE()" disabled>断开连接</button>
            <button id="clearBtn" onclick="clearMessages()">清空消息</button>
        </div>
        
        <div id="status" class="status disconnected">状态: 未连接</div>
        
        <div>
            <label>接收到的消息:</label>
            <div id="messages"></div>
        </div>
    </div>
</body>
<script>
    let eventSource = null;
    let headerCount = 0;
    const MAX_HISTORY = 10;
    const HISTORY_KEY = 'sse_history';
    let activeUrl = null; // 当前展开的接口

    // 初始化默认 header 行
    window.addEventListener('DOMContentLoaded', () => {
        addHeaderRow();
        loadHistory();
    });

    // 加载历史记录（保留当前展开状态）
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
        const historyList = document.getElementById('historyList');
        const urls = Object.keys(history).sort((a, b) => {
            const aTime = Math.max(...history[a].map(c => c.timestamp || 0));
            const bTime = Math.max(...history[b].map(c => c.timestamp || 0));
            return bTime - aTime;
        });

        if (urls.length === 0) {
            historyList.style.display = 'none';
            activeUrl = null;
            return;
        }

        // 如果当前展开的 URL 已不存在，重置
        if (activeUrl && !history[activeUrl]) {
            activeUrl = null;
        }

        historyList.style.display = 'block';
        historyList.innerHTML = urls.map(url => {
            const configs = history[url];
            const configsHtml = configs.map((config, index) => {
                const hasBody = config.body && config.body.trim();
                const hasHeaders = config.headers && Object.keys(config.headers).length > 0;

                // 生成预览信息
                let previewHtml = '';
                if (hasBody) {
                    const bodyPreview = config.body.length > 50 ? config.body.substring(0, 50) + '...' : config.body;
                    previewHtml += `<div class="config-preview">📝 Body: ${bodyPreview}</div>`;
                }
                if (hasHeaders) {
                    // 处理 header 值的长度
                    const processedHeaders = {};
                    Object.entries(config.headers).forEach(([key, value]) => {
                        processedHeaders[key] = value.length > 30 ? value.substring(0, 30) + '...' : value;
                    });
                    const headerJson = JSON.stringify(processedHeaders, null, 2);
                    previewHtml += `<div class="config-preview">🔑 Headers: ${headerJson}</div>`;
                }

                return `
                    <div class="config-item" onclick="selectConfig('${escapeHtml(url)}', ${index})">
                        <span class="config-info">
                            <div><span class="config-method">${config.method}</span></div>
                            ${previewHtml}
                        </span>
                        <button class="btn-delete" onclick="event.stopPropagation(); deleteConfig('${escapeHtml(url)}', ${index})">删除</button>
                    </div>
                `;
            }).join('');

            return `
                <div class="history-item">
                    <span class="history-url" onclick="toggleConfigs('${escapeHtml(url)}')">${url}</span>
                    <button class="btn-delete" onclick="event.stopPropagation(); deleteUrl('${escapeHtml(url)}')">删除</button>
                </div>
                <div id="configs-${escapeHtml(url)}" class="config-list" style="display: ${activeUrl === url ? 'block' : 'none'}">${configsHtml}</div>
            `;
        }).join('');
    }

    // 转义 HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 切换配置列表显示
    function toggleConfigs(url) {
        if (activeUrl === url) {
            // 已展开，则收起
            activeUrl = null;
        } else {
            activeUrl = url;
        }
        loadHistory();
    }

    // 保存历史记录
    function saveHistory(url, method, body, headers) {
        if (!url.trim()) return;

        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');

        if (!history[url]) {
            history[url] = [];
        }

        const config = {
            method: method,
            body: body,
            headers: headers,
            timestamp: Date.now()
        };

        // 检查是否已存在相同配置
        const existingIndex = history[url].findIndex(c =>
            c.method === method &&
            c.body === body &&
            JSON.stringify(c.headers) === JSON.stringify(headers)
        );

        if (existingIndex >= 0) {
            history[url][existingIndex].timestamp = Date.now();
        } else {
            history[url].push(config);
            if (history[url].length > MAX_HISTORY) {
                history[url].sort((a, b) => b.timestamp - a.timestamp);
                history[url] = history[url].slice(0, MAX_HISTORY);
            }
        }

        // 限制 URL 数量
        const urls = Object.keys(history);
        if (urls.length > MAX_HISTORY) {
            const sortedUrls = urls.sort((a, b) => {
                const aTime = Math.max(...history[a].map(c => c.timestamp || 0));
                const bTime = Math.max(...history[b].map(c => c.timestamp || 0));
                return bTime - aTime;
            });
            const urlsToKeep = sortedUrls.slice(0, MAX_HISTORY);
            const newHistory = {};
            urlsToKeep.forEach(u => newHistory[u] = history[u]);
            history = newHistory;
        }

        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        loadHistory();
    }

    // 选择配置
    function selectConfig(url, index) {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
        const config = history[url]?.[index];
        if (!config) return;

        document.getElementById('urlInput').value = url;
        document.getElementById('methodSelect').value = config.method;
        document.getElementById('bodyInput').value = config.body || '';

        // 清空现有 headers
        const container = document.getElementById('headersContainer');
        container.innerHTML = '';
        headerCount = 0;

        // 填充 headers
        const headers = config.headers || {};
        const headerEntries = Object.entries(headers);
        if (headerEntries.length === 0) {
            addHeaderRow();
        } else {
            headerEntries.forEach(([name, value]) => {
                const row = document.createElement('div');
                row.className = 'header-row';
                row.id = `header-${headerCount++}`;
                row.innerHTML = `
                    <input type="text" placeholder="Header 名称 (如: Authorization)" class="header-name" value="${escapeHtml(name)}">
                    <input type="text" placeholder="Header 值 (如: Bearer token)" class="header-value" value="${escapeHtml(value)}">
                    <button class="add-btn" onclick="addHeaderRow()">+ 添加</button>
                    <button class="remove-btn" onclick="removeHeaderRow('${row.id}')">- 删除</button>
                `;
                container.appendChild(row);
            });
            updateRemoveButtons();
        }
    }

    // 删除 URL
    function deleteUrl(url) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
        delete history[url];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        loadHistory();
    }

    // 删除配置
    function deleteConfig(url, index) {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
        if (history[url]) {
            history[url].splice(index, 1);
            if (history[url].length === 0) {
                delete history[url];
            }
        }
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        loadHistory();
    }


    // 添加 header 行
    function addHeaderRow() {
        const container = document.getElementById('headersContainer');
        const row = document.createElement('div');
        row.className = 'header-row';
        row.id = `header-${headerCount++}`;
        row.innerHTML = `
            <input type="text" placeholder="Header 名称 (如: Authorization)" class="header-name">
            <input type="text" placeholder="Header 值 (如: Bearer token)" class="header-value">
            <button class="add-btn" onclick="addHeaderRow()">+ 添加</button>
            <button class="remove-btn" onclick="removeHeaderRow('${row.id}')">- 删除</button>
        `;
        container.appendChild(row);
        updateRemoveButtons();
    }

    // 删除 header 行
    function removeHeaderRow(id) {
        const container = document.getElementById('headersContainer');
        if (container.children.length > 1) {
            document.getElementById(id).remove();
            updateRemoveButtons();
        }
    }

    // 更新删除按钮状态
    function updateRemoveButtons() {
        const container = document.getElementById('headersContainer');
        const removeButtons = container.querySelectorAll('.remove-btn');
        const shouldDisable = container.children.length === 1;
        removeButtons.forEach(btn => {
            btn.disabled = shouldDisable;
        });
    }

    // 使用 fetch 方式连接 SSE (支持自定义 header)
    async function connectSSE() {
        const url = document.getElementById('urlInput').value;
        const method = document.getElementById('methodSelect').value;
        const body = document.getElementById('bodyInput').value.trim();

        if (!url) {
            alert('请输入 SSE 接口地址');
            return;
        }

        // 构建 headers
        const headers = {};
        const headerRows = document.querySelectorAll('.header-row');
        headerRows.forEach(row => {
            const name = row.querySelector('.header-name').value.trim();
            const value = row.querySelector('.header-value').value.trim();
            if (name && value) {
                headers[name] = value;
            }
        });

        try {
            // 构建请求配置
            const fetchOptions = {
                method: method,
                headers: headers,
            };

            // 如果有 body 且不是 GET 请求，添加 body
            if (body && method !== 'GET') {
                fetchOptions.body = body;
            }

            // 使用 fetch 发起请求
            const response = await fetch(url, fetchOptions);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            // 读取流
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            updateStatus('connected', '已连接');
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('disconnectBtn').disabled = false;

            // 保存历史记录
            saveHistory(url, method, body, headers);

            // 持续读取数据
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                
                if (done) {
                    addMessage('连接已关闭', 'info');
                    disconnectSSE();
                    break;
                }

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n\n');
                buffer = lines.pop(); // 保留不完整的数据

                lines.forEach(line => {
                    if (line.trim()) {
                        parseSSEMessage(line);
                    }
                });
            }
        } catch (error) {
            addMessage('连接错误: ' + error.message, 'error');
            updateStatus('disconnected', '连接失败');
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
        }
    }

    // 解析 SSE 消息
    function parseSSEMessage(message) {
        const lines = message.split('\n');
        let data = '';
        let event = 'message';
        let id = '';

        lines.forEach(line => {
            if (line.startsWith('data:')) {
                data += line.substring(5).trim() + '\n';
            } else if (line.startsWith('event:')) {
                event = line.substring(6).trim();
            } else if (line.startsWith('id:')) {
                id = line.substring(3).trim();
            }
        });

        if (data) {
            addMessage(data.trim(), 'message', event, id);
        }
    }

    // 断开连接
    function disconnectSSE() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
        
        updateStatus('disconnected', '已断开');
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
    }

    // 更新状态
    function updateStatus(status, text) {
        const statusDiv = document.getElementById('status');
        statusDiv.className = 'status ' + status;
        statusDiv.textContent = '状态: ' + text;
    }

    // 添加消息到显示区域
    function addMessage(text, type = 'message', event = '', id = '') {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message' + (type === 'error' ? ' error' : '');
        
        const timestamp = new Date().toLocaleTimeString();
        let content = `<span class="timestamp">[${timestamp}]</span> `;
        
        if (event) {
            content += `<strong>[${event}]</strong> `;
        }
        if (id) {
            content += `<small>(id: ${id})</small> `;
        }
        
        content += text;
        messageDiv.innerHTML = content;
        
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 清空消息
    function clearMessages() {
        document.getElementById('messages').innerHTML = '';
    }

    // 页面卸载时断开连接
    window.addEventListener('beforeunload', () => {
        disconnectSSE();
    });
</script>
</html>
