<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字符串工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: white;
        }
        .container {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
        }
        .section h3 {
            color: #555;
            margin-bottom: 12px;
            font-size: 16px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 10px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
            color: white;
        }
        .btn-primary {
            background: #2196F3;
        }
        .btn-primary:hover {
            background: #0b7dda;
        }
        .btn-success {
            background: #4CAF50;
        }
        .btn-success:hover {
            background: #45a049;
        }
        .btn-warning {
            background: #ff9800;
        }
        .btn-warning:hover {
            background: #e68900;
        }
        .result {
            background: white;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 60px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .stat-item {
            background: white;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #2196F3;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 字符串工具</h1>

        <div class="section">
            <h3>输入文本</h3>
            <textarea id="input" rows="6" placeholder="在此输入文本..."></textarea>
            <div class="stats" id="stats"></div>
        </div>

        <div class="section">
            <h3>大小写转换</h3>
            <div class="button-group">
                <button class="btn-primary" onclick="transform('upper')">转大写</button>
                <button class="btn-primary" onclick="transform('lower')">转小写</button>
                <button class="btn-primary" onclick="transform('capitalize')">首字母大写</button>
            </div>
            <div class="result" id="caseResult"></div>
        </div>

        <div class="section">
            <h3>Base64 编码/解码</h3>
            <div class="button-group">
                <button class="btn-success" onclick="base64Encode()">Base64 编码</button>
                <button class="btn-success" onclick="base64Decode()">Base64 解码</button>
            </div>
            <div class="result" id="base64Result"></div>
        </div>

        <div class="section">
            <h3>URL 编码/解码</h3>
            <div class="button-group">
                <button class="btn-warning" onclick="urlEncode()">URL 编码</button>
                <button class="btn-warning" onclick="urlDecode()">URL 解码</button>
            </div>
            <div class="result" id="urlResult"></div>
        </div>

        <div class="section">
            <h3>空格处理</h3>
            <div class="button-group">
                <button class="btn-primary" onclick="trimSpace('trim')">去除首尾空格</button>
                <button class="btn-primary" onclick="trimSpace('all')">去除所有空格</button>
            </div>
            <div class="result" id="trimResult"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');

        input.addEventListener('input', updateStats);

        function updateStats() {
            const text = input.value;
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">字符数</div>
                    <div class="stat-value">${text.length}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">字数</div>
                    <div class="stat-value">${text.trim() ? text.trim().split(/\s+/).length : 0}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">行数</div>
                    <div class="stat-value">${text ? text.split('\n').length : 0}</div>
                </div>
            `;
        }

        function transform(type) {
            const text = input.value;
            let result = '';
            if (type === 'upper') result = text.toUpperCase();
            else if (type === 'lower') result = text.toLowerCase();
            else if (type === 'capitalize') result = text.replace(/\b\w/g, c => c.toUpperCase());
            document.getElementById('caseResult').textContent = result;
        }

        function base64Encode() {
            try {
                const result = btoa(unescape(encodeURIComponent(input.value)));
                document.getElementById('base64Result').textContent = result;
            } catch (e) {
                document.getElementById('base64Result').textContent = '编码失败: ' + e.message;
            }
        }

        function base64Decode() {
            try {
                const result = decodeURIComponent(escape(atob(input.value)));
                document.getElementById('base64Result').textContent = result;
            } catch (e) {
                document.getElementById('base64Result').textContent = '解码失败: ' + e.message;
            }
        }

        function urlEncode() {
            const result = encodeURIComponent(input.value);
            document.getElementById('urlResult').textContent = result;
        }

        function urlDecode() {
            try {
                const result = decodeURIComponent(input.value);
                document.getElementById('urlResult').textContent = result;
            } catch (e) {
                document.getElementById('urlResult').textContent = '解码失败: ' + e.message;
            }
        }

        function trimSpace(type) {
            const text = input.value;
            const result = type === 'trim' ? text.trim() : text.replace(/\s+/g, '');
            document.getElementById('trimResult').textContent = result;
        }

        updateStats();
    </script>
</body>
</html>
