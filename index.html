<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发工具包</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            flex: 1;
        }
        /* 移动端菜单切换按钮 */
        .menu-toggle {
            display: none;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
            gap: 16px;
            padding: 16px;
        }
        .sidebar {
            width: 240px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow-y: auto;
            padding: 8px;
            flex-shrink: 0;
        }
        .menu-item {
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 15px;
            color: #1f2937;
            transition: background 0.15s;
        }
        .menu-item:hover {
            background: #f3f4f6;
        }
        .submenu {
            display: none;
            margin: 4px 0 8px 0;
        }
        .submenu.open {
            display: block;
        }
        .submenu-item {
            padding: 10px 16px 10px 32px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 6px;
            color: #4b5563;
            transition: all 0.15s;
            margin: 2px 0;
        }
        .submenu-item:hover {
            background: #f9fafb;
            color: #667eea;
            transform: translateX(2px);
        }
        .submenu-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
        }
        .open-new {
            opacity: 0;
            font-size: 12px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .submenu-item:hover .open-new {
            opacity: 1;
        }
        .submenu-item.active .open-new {
            background: rgba(255,255,255,0.2);
        }
        .open-new:hover {
            background: rgba(0,0,0,0.12);
        }
        .submenu-item.active .open-new:hover {
            background: rgba(255,255,255,0.3);
        }
        .content {
            flex: 1;
            display: flex;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
            min-width: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* 移动端遮罩 */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 10;
        }
        .overlay.show {
            display: block;
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .header {
                padding: 14px 16px;
            }
            .header h1 {
                font-size: 18px;
            }
            .menu-toggle {
                display: flex;
            }
            .main {
                padding: 12px;
                gap: 0;
            }
            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                width: 240px;
                height: 100vh;
                border-radius: 0 12px 12px 0;
                z-index: 20;
                transition: left 0.25s ease;
                padding-top: 16px;
            }
            .sidebar.open {
                left: 0;
            }
            .content {
                border-radius: 8px;
            }
            /* 移动端子菜单项放大点击区域 */
            .submenu-item {
                padding: 12px 16px 12px 32px;
                font-size: 15px;
            }
            /* 移动端始终显示外链按钮 */
            .open-new {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div class="header">
        <h1>🛠️ 开发工具包</h1>
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="main">
        <div class="sidebar" id="sidebar"></div>
        <div class="content">
            <iframe id="mainFrame"></iframe>
        </div>
    </div>
</body>
<script>
    const menuConfig = [
        {
            id: 'network',
            name: '📡 网络',
            open: true,
            children: [
                { name: 'WebSocket 调试', uri: 'network/websocket.html', active: true },
                { name: 'SSE 调试', uri: 'network/sse.html' }
            ]
        }
    ];

    function renderMenu() {
        const sidebar = document.getElementById('sidebar');
        menuConfig.forEach(menu => {
            const menuItem = document.createElement('div');
            menuItem.className = 'menu-item';
            menuItem.textContent = menu.name;
            menuItem.onclick = () => toggleMenu(menu.id);
            sidebar.appendChild(menuItem);

            const submenu = document.createElement('div');
            submenu.id = menu.id;
            submenu.className = 'submenu' + (menu.open ? ' open' : '');
            menu.children.forEach(item => {
                const subItem = document.createElement('div');
                subItem.className = 'submenu-item' + (item.active ? ' active' : '');
                subItem.onclick = function() { loadPage(item.uri, this); };
                subItem.innerHTML = `<span>${item.name}</span><span class="open-new" onclick="event.stopPropagation(); window.open('${item.uri}')">↗</span>`;
                submenu.appendChild(subItem);
                if (item.active) document.getElementById('mainFrame').src = item.uri;
            });
            sidebar.appendChild(submenu);
        });
    }

    function toggleMenu(id) {
        document.getElementById(id).classList.toggle('open');
    }

    function loadPage(url, el) {
        document.getElementById('mainFrame').src = url;
        document.querySelectorAll('.submenu-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        // 更新 URL 参数
        const params = new URLSearchParams(location.search);
        params.set('tool', url);
        history.replaceState(null, '', '?' + params.toString());
        // 移动端选中后自动关闭侧边栏
        if (window.innerWidth <= 640) closeSidebar();
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    renderMenu();
    // 支持通过 URL 参数直接定位到具体工具页面，如 ?tool=network/sse.html
    (function() {
        const params = new URLSearchParams(location.search);
        const tool = params.get('tool');
        if (!tool) return;
        // 遍历菜单找到匹配的子项并激活
        for (const menu of menuConfig) {
            for (const item of menu.children) {
                if (item.uri === tool) {
                    // 展开对应父菜单
                    document.getElementById(menu.id).classList.add('open');
                    // 加载页面并更新 active 状态
                    const allItems = document.querySelectorAll('.submenu-item');
                    allItems.forEach(el => el.classList.remove('active'));
                    // 找到对应 DOM 并激活
                    const submenuEl = document.getElementById(menu.id);
                    const subItems = submenuEl.querySelectorAll('.submenu-item');
                    const menuChildren = menu.children;
                    for (let i = 0; i < menuChildren.length; i++) {
                        if (menuChildren[i].uri === tool) {
                            subItems[i].classList.add('active');
                            break;
                        }
                    }
                    document.getElementById('mainFrame').src = tool;
                    return;
                }
            }
        }
    })();
</script>
</html>
